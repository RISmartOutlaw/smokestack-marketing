<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback Card (Print) | Backroom</title>
    <meta name="robots" content="noindex">
    <style>
        /* Print-first counter card / table tent. White background for ink economy. */
        :root { --ink: #111; --muted: #555; --gold: #b8860b; }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; background: #f2f2f2; color: var(--ink);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        .sheet { max-width: 420px; margin: 24px auto; background: #fff; border: 1px solid #ddd;
            border-radius: 12px; padding: 32px 28px; text-align: center; }
        .brand { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 0 0 4px; }
        .headline { font-size: 30px; font-weight: 800; margin: 4px 0 2px; }
        .headline .q { color: var(--gold); }
        .sub { font-size: 15px; color: var(--muted); margin: 0 0 20px; }
        .qr { width: 240px; height: 240px; margin: 0 auto 16px; display: block; }
        .scan { font-size: 17px; font-weight: 700; margin: 0 0 4px; }
        .url { font-size: 14px; color: var(--muted); word-break: break-all; margin: 0 0 8px; }
        .stars { font-size: 22px; letter-spacing: 3px; color: var(--gold); margin: 8px 0 0; }
        .foot { font-size: 11px; color: #999; margin: 18px 0 0; }
        .hint { max-width: 420px; margin: 0 auto 24px; font-size: 12px; color: #666; text-align: center; }

        @media print {
            body { background: #fff; }
            .hint, .noprint { display: none !important; }
            .sheet { border: none; margin: 0 auto; box-shadow: none; }
            @page { margin: 12mm; }
        }
    </style>
</head>
<body>

    <p class="hint noprint">Print this page (Ctrl/Cmd&nbsp;+&nbsp;P) for a counter card. Swap <code>feedback-qr.svg</code> if your domain changes &mdash; see FEEDBACK_ROLLOUT.md.</p>

    <div class="sheet">
        <p class="brand">Backroom</p>
        <h1 class="headline">How did we do<span class="q">?</span></h1>
        <p class="sub">Your feedback takes ten seconds.</p>

        <img class="qr" src="feedback-qr.svg" alt="QR code linking to our feedback page">

        <p class="scan">Scan to leave a review</p>
        <p class="url">smokestack.outlawsmokevape.com/feedback.html</p>
        <p class="stars">&#9733;&#9733;&#9733;&#9733;&#9733;</p>

        <p class="foot">Thank you for stopping by.</p>
    </div>

</body>
</html>
